<!DOCTYPE html>
<html lang="tr">
<head>
    <title> Bulut Depo </title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #334155; --danger: #ef4444; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        /* Modern Giriş Alanı */
        .login-box { margin-top: 15vh; width: 90%; max-width: 400px; padding: 40px; background: var(--card); border-radius: 20px; border: 1px solid var(--accent); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn-google { background: white; color: #1e293b; border: none; padding: 14px; cursor: pointer; width: 100%; border-radius: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }

        /* Admin Paneli Layout */
        #adminDashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; grid-template-columns: 240px 1fr; gap: 20px; }
        .sidebar { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid var(--accent); height: fit-content; }
        .main-view { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid var(--accent); }

        /* İstatistik Kartları */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--bg); padding: 15px; border-radius: 10px; border-top: 3px solid var(--primary); }
        .stat-card small { color: #94a3b8; font-size: 11px; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; }

        /* Navigasyon */
        .nav-link { background: transparent; color: #94a3b8; border: none; width: 100%; text-align: left; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; }
        .nav-link.active, .nav-link:hover { background: var(--accent); color: var(--primary); }

        /* Dosya ve Kullanıcı Listesi */
        .data-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-table th { text-align: left; padding: 12px; color: var(--primary); border-bottom: 2px solid var(--accent); }
        .data-table td { padding: 12px; border-bottom: 1px solid var(--accent); font-size: 14px; }

        /* Kullanıcı Ekranı */
        #userView { display: none; width: 90%; max-width: 500px; padding: 20px; }
        .drop-zone { border: 2px dashed var(--primary); padding: 40px; border-radius: 15px; text-align: center; background: rgba(56, 189, 248, 0.05); cursor: pointer; margin-bottom: 20px; }

        .btn-action { padding: 5px 10px; border-radius: 5px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        footer { margin-top: auto; padding: 30px; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

    <div id="authSection" class="login-box">
        <h2 style="color:var(--primary)">Bulut Depo PRO</h2>
        <p style="color:#94a3b8">Dosyalarınızı Güvenle Depolayın</p>
        <button class="btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
            Google ile Giriş Yap
        </button>
    </div>

    <div id="adminDashboard">
        <aside class="sidebar">
            <h3 style="font-size:16px; margin-bottom:20px; color:var(--primary)">ADMİN PANELİ</h3>
            <button class="nav-link active" onclick="showTab('stats')">📊 Özet</button>
            <button class="nav-link" onclick="showTab('users')">👥 Kullanıcılar</button>
            <button class="nav-link" onclick="showTab('files')">📂 Tüm Dosyalar</button>
            <button class="nav-link" onclick="logout()" style="color:var(--danger); margin-top:30px">🚪 Çıkış</button>
        </aside>

        <main class="main-view">
            <div id="tab-stats">
                <div class="stats-grid">
                    <div class="stat-card"><small>KULLANICI</small><p id="sUsers">0</p></div>
                    <div class="stat-card"><small>DOSYA</small><p id="sFiles">0</p></div>
                    <div class="stat-card"><small>ALAN</small><p id="sSize">0 MB</p></div>
                </div>
                <h4 style="color:var(--primary)">Son Hareketler (Canlı Log)</h4>
                <div id="liveLogs" style="font-size:12px; color:#94a3b8; background:var(--bg); padding:10px; border-radius:8px; max-height:200px; overflow-y:auto">
                    Loglar bekleniyor...
                </div>
            </div>

            <div id="tab-users" style="display:none">
                <h4>Kullanıcı Yönetimi</h4>
                <table class="data-table">
                    <thead><tr><th>E-Posta</th><th>Dosya</th><th>İşlem</th></tr></thead>
                    <tbody id="userList"></tbody>
                </table>
            </div>

            <div id="tab-files" style="display:none">
                <input type="text" placeholder="Dosya veya kullanıcı ara..." style="width:100%; padding:10px; background:var(--bg); border:1px solid var(--accent); color:white; border-radius:8px" onkeyup="searchFiles(this.value)">
                <table class="data-table">
                    <thead><tr><th>Sahibi</th><th>Dosya</th><th>Boyut</th><th>İşlem</th></tr></thead>
                    <tbody id="allFilesList"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="userView">
        <div class="main-view">
            <h3 id="uEmail" style="margin-top:0; font-size:16px"></h3>
            <div class="drop-zone" id="dropZone">📁 Dosyayı Buraya Bırak</div>
            <div id="status" style="text-align:center; font-weight:bold; color:var(--primary)"></div>
            <button class="nav-link" onclick="logout()" style="text-align:center; border:1px solid var(--accent)">Oturumu Kapat</button>
        </div>
        <h4 style="margin-top:20px; color:var(--primary)">Dosyalarım</h4>
        <div id="userFileList"></div>
    </div>

    <footer>© 2026 BULUT DEPO PRO - A.K</footer>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx_1jHH1hi-oO_r6N3qhp-DnMFXCfxOoPhmiTTLH4TZj2H_lYe-LqGdD441tnj3SGFoew/exec";
        
        // Firebase Yapılandırman...
        const firebaseConfig = {
            apiKey: "AIzaSyCBWeHWBQu4d8Ph_4ySlCpa-ex7fBr4dww",
            authDomain: "project-add-78a10.firebaseapp.com",
            projectId: "project-add-78a10",
            storageBucket: "project-add-78a10.firebasestorage.app",
            messagingSenderId: "195140034011",
            appId: "1:195140034011:web:1e59e01f70064cff21dbfe",
            measurementId: "G-HZPJ0MVBYX"
        };
        firebase.initializeApp(firebaseConfig);

        // LOG TAKİPÇİSİ
        function logAction(action, detail) {
            const user = firebase.auth().currentUser;
            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: action, detail: detail, userEmail: user ? user.email : "Bilinmeyen" })
            });
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                logAction("GIRIS_YAPILDI", "Kullanıcı sisteme girdi.");
                loadDashboard(user);
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('adminDashboard').style.display = 'none';
                document.getElementById('userView').style.display = 'none';
            }
        });

        function loadDashboard(user) {
            fetch(WEB_APP_URL + "?userEmail=" + user.email)
            .then(res => res.json())
            .then(data => {
                if(data.isAdmin) {
                    document.getElementById('adminDashboard').style.display = 'grid';
                    renderAdmin(data);
                } else {
                    document.getElementById('userView').style.display = 'block';
                    document.getElementById('uEmail').innerText = user.email;
                    renderUserFiles(data.files);
                }
            });
        }

        function renderAdmin(data) {
            document.getElementById('sUsers').innerText = data.stats.totalUsers;
            document.getElementById('sFiles').innerText = data.stats.totalFiles;
            document.getElementById('sSize').innerText = (data.stats.totalSize / 1024 / 1024).toFixed(2) + " MB";
            
            document.getElementById('userList').innerHTML = data.users.map(u => `
                <tr><td>${u.name}</td><td>${u.fileCount}</td><td><button class="btn-action" style="background:var(--warning)" onclick="logAction('ENGELLEME_TIKLANDI','${u.name}')">ENGELLE</button></td></tr>
            `).join('');

            window.masterFiles = data.files;
            renderAdminFiles(data.files);
        }

        function renderAdminFiles(files) {
            document.getElementById('allFilesList').innerHTML = files.map(f => `
                <tr><td><small>${f.owner}</small></td><td>${f.name}</td><td>${f.size}</td><td><a href="${f.url}" target="_blank" onclick="logAction('ADMIN_DOSYA_ACTI','${f.name}')">AÇ</a></td></tr>
            `).join('');
        }

        function showTab(tab) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
            document.getElementById('tab-' + tab).style.display = 'block';
            logAction("SEKME_DEGISTI", tab + " sekmesine bakıyor.");
        }

        function logout() { 
            logAction("CIKIS_YAPTI", "Oturum kapatıldı.");
            firebase.auth().signOut(); 
        }

        // Sürükle Bırak
        const dz = document.getElementById('dropZone');
        dz.onclick = () => { logAction("BUTON_TIKLANDI", "Dosya seçici açıldı."); document.createElement('input'); /* ... */ };
        // ... (Upload fonksiyonlarını buraya ekle)
    </script>
</body>
</html>
