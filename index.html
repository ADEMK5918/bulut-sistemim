<!DOCTYPE html>
<html lang="tr">
<head>
    <title>Bulut Depolama | Dijital Arşiv Merkezi</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { 
            --primary: #800000; --secondary: #B8860B; --bg: #FFFAF0; 
            --card: #FFFFFF; --text: #2F4F4F; --border: #DCDCDC; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.8; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; }

        .btn-classic { background: var(--primary); color: #FFF; border: 2px solid var(--primary); padding: 15px 40px; border-radius: 4px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-classic:hover { background: #600000; color: var(--secondary); }

        /* --- BÖLÜMLER --- */
        .section-hero, #authSection { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 20px; text-align: center; }
        .hero-content h1 { font-size: clamp(2.5rem, 8vw, 4rem); color: var(--primary); text-transform: uppercase; }
        
        .login-card { background: #FFF; padding: 60px 50px; width: 100%; max-width: 450px; border: 4px double var(--primary); text-align: center; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .login-card::before { content: "⚜"; position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: var(--secondary); font-size: 26px; }

        /* --- PANEL --- */
        #userPanel { display: none; padding: 40px 20px; min-height: 100vh; }
        .archive-wrapper { max-width: 1200px; margin: 0 auto; background: var(--card); border: 4px double var(--primary); padding: 40px; }
        .tab-btn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 10px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { background: var(--primary); color: #FFF; }

        .drop-zone { border: 2px dashed var(--primary); background: #f4eee0; padding: 60px; text-align: center; cursor: pointer; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .file-box { background: #fff; border: 1px solid var(--border); padding: 15px; text-align: center; position: relative; }
        
        .delete-btn { position: absolute; top: 5px; right: 5px; color: #800000; cursor: pointer; border: none; background: none; font-weight: bold; }
        .diary-paper { background: #FFF; border: 1px solid var(--border); padding: 40px; background-image: linear-gradient(var(--bg) 1px, transparent 1px); background-size: 100% 35px; }
        .diary-area { width: 100%; height: 350px; background: transparent; border: none; outline: none; font-size: 18px; line-height: 35px; }
        .sealed-entry { margin-top: 25px; padding: 25px; border-left: 5px solid var(--secondary); background: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <section class="section-hero" id="hero">
        <div class="hero-content">
            <h1>Bulut Depolama</h1>
            <p style="margin-bottom: 20px;">Dijital Arşiv ve Şahsi Kayıt Merkezi</p>
            <button class="btn-classic" onclick="document.getElementById('authSection').scrollIntoView()">Tasdik ve Giriş</button>
        </div>
    </section>

    <section id="authSection">
        <div class="login-card">
            <h2>Kimlik Doğrulama</h2>
            <button class="btn-classic" style="width: 100%; margin-top: 20px;" id="loginBtn">Google Hesabı ile Bağlan</button>
            <br><br><a href="#hero" style="color:var(--secondary); font-size:12px; font-weight:bold; text-decoration:none;">← Geri Dön</a>
        </div>
    </section>

    <section id="userPanel">
        <div class="archive-wrapper">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px; border-bottom:2px solid var(--secondary); padding-bottom:15px;">
                <div>
                    <h2 style="color:var(--primary)">Şahsi Arşiv</h2>
                    <small id="userEmail" style="color:var(--secondary); font-style:italic;"></small>
                </div>
                <button class="tab-btn" onclick="logout()">Çıkış</button>
            </div>

            <div style="margin-bottom: 20px;">
                <button class="tab-btn active" id="btn-notes" onclick="switchTab('notes')">🎓 Notlar</button>
                <button class="tab-btn" id="btn-diary" onclick="switchTab('diary')">✍️ Günlük</button>
            </div>

            <div id="view-notes">
                <div class="drop-zone" onclick="document.getElementById('fi').click()">
                    📂 Dosyaları buraya bırakın veya seçin
                    <input type="file" id="fi" multiple class="hidden" onchange="uploadFiles(this.files)">
                </div>
                <div class="file-grid" id="fl"></div>
            </div>

            <div id="view-diary" class="hidden">
                <div class="diary-paper">
                    <textarea id="diaryInput" class="diary-area" placeholder="Zihninize düşenleri aktarın..."></textarea>
                </div>
                <button class="btn-classic" style="margin-top:20px; float:right;" onclick="sealDiary()">Mühürle</button>
                <div style="clear:both;" id="sealedEntries"></div>
            </div>
        </div>
    </section>

    <script>
        // 1. AYARLAR
        const firebaseConfig = {
            apiKey: "AIzaSyCBWeHWBQu4d8Ph_4ySlCpa-ex7fBr4dww",
            authDomain: "project-add-78a10.firebaseapp.com",
            projectId: "project-add-78a10",
            appId: "1:195140034011:web:1e59e01f70064cff21dbfe"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyPURhxsYhQpWHWhanUZ1a9_-lgFLgKQfZ2KhP41v9JqjNq6t4xQjpmphS1DbAhZRCpug/exec";

        // 2. GİRİŞ TETİKLEYİCİ (EventListener en garantisidir)
        document.getElementById('loginBtn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => alert("Hata: " + e.message));
        });

        function logout() { auth.signOut().then(() => location.reload()); }

        // 3. OTURUM DİNLEYİCİ
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('hero').classList.add('hidden');
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('userPanel').style.display = 'block';
                document.getElementById('userEmail').innerText = "Tasdikli: " + user.email;
                loadFiles();
            }
        });

        function switchTab(t) {
            document.getElementById('view-notes').classList.toggle('hidden', t !== 'notes');
            document.getElementById('view-diary').classList.toggle('hidden', t !== 'diary');
            document.getElementById('btn-notes').classList.toggle('active', t === 'notes');
            document.getElementById('btn-diary').classList.toggle('active', t === 'diary');
        }

        function loadFiles() {
            const email = auth.currentUser.email;
            fetch(`${WEB_APP_URL}?userEmail=${email}`)
                .then(res => res.json())
                .then(data => {
                    const fl = document.getElementById('fl');
                    fl.innerHTML = data.files.length ? "" : "Kayıt yok.";
                    data.files.forEach(f => {
                        const div = document.createElement('div');
                        div.className = 'file-box';
                        div.innerHTML = `
                            <button class="delete-btn" onclick="deleteFile('${f.id}')">✕</button>
                            📄<br><strong>${f.name}</strong><br>
                            <a href="${f.url}" target="_blank" style="font-size:11px; color:var(--primary)">TETKİK ET</a>
                        `;
                        fl.appendChild(div);
                    });
                });
        }

        function uploadFiles(files) {
            const email = auth.currentUser.email;
            for (let f of files) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64 = e.target.result.split(',')[1];
                    fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ action: "upload", fileName: f.name, mimeType: f.type, base64: base64, userEmail: email })
                    }).then(() => loadFiles());
                };
                reader.readAsDataURL(f);
            }
        }

        function sealDiary() {
            const text = document.getElementById('diaryInput').value;
            if (!text) return;
            const now = new Date();
            const ts = now.toLocaleDateString('tr-TR') + " | " + now.toLocaleTimeString('tr-TR');
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ action: "upload", fileName: "Muhur_" + now.getTime() + ".txt", mimeType: "text/plain", base64: btoa(unescape(encodeURIComponent(text))), userEmail: auth.currentUser.email })
            }).then(() => {
                const div = document.createElement('div');
                div.className = 'sealed-entry';
                div.innerHTML = `<p>${text}</p><small>${ts}</small>`;
                document.getElementById('sealedEntries').prepend(div);
                document.getElementById('diaryInput').value = "";
                loadFiles();
            });
        }
    </script>
</body>
</html>
