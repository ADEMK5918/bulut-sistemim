<!DOCTYPE html>
<html lang="tr">
<head>
    <title>Bulut Depom</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .card { background: #1e293b; padding: 25px; border-radius: 16px; width: 100%; max-width: 420px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        .btn-google { background: white; color: #444; border: none; padding: 12px; cursor: pointer; width: 95%; border-radius: 8px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; margin: 0 auto; }
        .btn-google:hover { background: #f1f5f9; transform: translateY(-1px); }
        .btn-google img { width: 20px; }
        button.primary { background: #38bdf8; color: #0f172a; border: none; padding: 12px; cursor: pointer; width: 95%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .btn-logout { background: transparent; color: #94a3b8; border: 1px solid #334155; padding: 6px 15px; font-size: 13px; margin-top: 15px; border-radius: 6px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; width: auto; padding: 4px 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
        #mainContent { display: none; width: 100%; max-width: 500px; }
        .file-item { background: #334155; margin: 10px 0; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #38bdf8; }
        .file-link { color: #38bdf8; text-decoration: none; font-weight: bold; font-size: 14px; margin-right: 10px; }
        #status { color: #22c55e; font-size: 14px; margin-top: 10px; min-height: 20px; }
        .user-info { font-size: 14px; color: #94a3b8; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .user-photo { width: 32px; border-radius: 50%; border: 2px solid #38bdf8; }
        footer { margin-top: auto; padding: 20px; text-align: center; color: #64748b; font-size: 13px; width: 100%; }
        .footer-line { height: 1px; background: linear-gradient(to right, transparent, #334155, transparent); margin-bottom: 10px; width: 80%; margin: 0 auto 10px; }
        .ak-logo { color: #38bdf8; font-weight: bold; letter-spacing: 2px; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="card" id="authSection">
        <h2>Bulut Depo</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Lütfen Google hesabınla giriş yap.</p>
        <button class="btn-google" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Google ile Giriş Yap
        </button>
    </div>

    <div id="mainContent">
        <div class="card">
            <div class="user-info">
                <img id="userPhoto" class="user-photo" src="" alt="">
                <span id="welcomeUser"></span>
            </div>
            <input type="file" id="fileInput" style="color: white; margin: 15px 0;">
            <button class="primary" onclick="uploadFile()">Drive'a Yükle</button>
            <div id="status"></div>
            <button onclick="logout()" class="btn-logout">Oturumu Kapat</button>
        </div>

        <div class="card">
            <h3>Dosyalarım</h3>
            <div id="fileList"></div>
            <button onclick="loadFiles()" style="background:#6366f1; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; width:95%; margin-top:15px; font-weight:bold;">Listeyi Yenile</button>
        </div>
    </div>

    <footer>
        <div class="footer-line"></div>
        <p>© 2026 Tüm Hakları Saklıdır</p>
        <span class="ak-logo">A.K</span>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

   <script>
        // --- AYARLAR ---
        // Apps Script'ten aldığın EN YENİ linki buraya yapıştır
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbweR9-QUVXVQy6FiGWItRhNhlHfWHDDgXrsy2JkcYN8nfnF01f_qGVgnaasom3bpF9BDw/exec";

        const firebaseConfig = {
            apiKey: "AIzaSyCBWeHWBQu4d8Ph_4ySlCpa-ex7fBr4dww",
            authDomain: "project-add-78a10.firebaseapp.com",
            projectId: "project-add-78a10",
            storageBucket: "project-add-78a10.firebasestorage.app",
            messagingSenderId: "195140034011",
            appId: "1:195140034011:web:1e59e01f70064cff21dbfe",
            measurementId: "G-HZPJ0MVBYX"
        };
        firebase.initializeApp(firebaseConfig);

        // OTURUM TAKİBİ
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('welcomeUser').innerText = user.email;
                document.getElementById('userPhoto').src = user.photoURL || 'https://via.placeholder.com/32';
                loadFiles();
            } else {
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // Giriş, Çıkış, Yükleme ve Listeleme fonksiyonları aşağıda aynen devam etsin...
        // Sadece yanlışlıkla araya giren "function doGet" kısmını sildiğinden emin ol.
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            // popup çalışmazsa redirect deneyebilirsin: signInWithRedirect
            firebase.auth().signInWithPopup(provider).catch(err => alert("Hata: " + err.message));
        }

        function logout() {
            if(confirm("Çıkış yapıyorsun?")) firebase.auth().signOut();
        }

        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const user = firebase.auth().currentUser;
            const status = document.getElementById('status');
            if (!file) return alert("Dosya seç!");

            status.innerText = "⏳ Yükleniyor...";
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result.split(',')[1];
                const data = { action:"upload", fileName: file.name, mimeType: file.type, base64: base64, userEmail: user.email };
                fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify(data) })
                .then(res => res.json())
                .then(() => { 
                    status.innerText = "✅ Başarıyla Yüklendi!"; 
                    fileInput.value = "";
                    setTimeout(() => status.innerText = "", 3000);
                    loadFiles(); 
                });
            };
            reader.readAsDataURL(file);
        }
        function doGet(e) {
  var userEmail = e.parameter.userEmail;
  var mainFolder = DriveApp.getFolderById(MAIN_FOLDER_ID);
  
  // SADECE BU MAİL ADMİN OLSUN (Senin yeni mailini yaz)
  var ADMIN_EMAIL = "YENI_EPOSTAN@gmail.com"; 

  if (userEmail === ADMIN_EMAIL) {
    // Admin ise her şeyi göster (Tüm klasörleri tara)
    // ... (mevcut listeleme kodun)
  } else {
    // Normal kullanıcı ise sadece kendi klasörünü görsün
    // ...
  }
}

        function loadFiles() {
            const user = firebase.auth().currentUser;
            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = "<p style='color:#94a3b8'>Dosyalar listeleniyor...</p>";

            fetch(WEB_APP_URL + "?userEmail=" + user.email)
            .then(res => res.json())
            .then(files => {
                listDiv.innerHTML = "";
                if(files.length === 0) listDiv.innerHTML = "<p style='color:#94a3b8'>Henüz dosya yok.</p>";
                files.forEach(f => {
                    listDiv.innerHTML += `
                        <div class="file-item">
                            <span>${f.name}</span>
                            <div>
                                <a href="${f.url}" target="_blank" class="file-link">AÇ</a>
                                <button class="btn-delete" onclick="deleteFile('${f.id}')">SİL</button>
                            </div>
                        </div>`;
                });
            });
        }

        function deleteFile(fileId) {
            if(!confirm("Bu dosya kalıcı olarak silinecek?")) return;
            fetch(WEB_APP_URL, { method: "POST", body: JSON.stringify({ action: "delete", fileId: fileId }) })
            .then(() => loadFiles());
        }
    </script>
</body>
</html>
